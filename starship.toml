# ~/.config/starship.toml

[aws]
format = '[$symbol($profile)(\($region\))(\[$duration\])]($style)'
style = 'bold orange'
symbol = ' ¾░ûÉ '
[aws.region_aliases]
ap-southeast-2 = 'au'
us-east-1 = 'va'
[aws.profile_aliases]


#New comment
[time]
disabled = false
format = '[ ¯Ää  $time ]($style)'
time_format = '%H:%M'
style = 'bg:#73dacb fg:bold #1a1b26'

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔŞ£](green)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'


# ~/.config/starship.toml
[terraform]
format = '[$symbol$workspace ]($style)'
symbol = ' ¾▒üó '


[python]
format = '[$symbol$virtualenv]($style)'
symbol = ' ¯İå '
# Follow symlinks on the path and show the full path
[golang]
format = '[ $symbol $version ]($style)'
symbol = '¯İğ'
# Show the full path in the prompt
[directory]
truncation_length = 3
truncation_symbol = 'ÔÇĞ/'
format = '[ ´äö  $path ]($style)'
style = 'bg:#ff9e64 fg:bold #1a1b26'

# Show the username and hostname in the prompt
[username]
show_always = true
disabled = false
style_user = 'bg:#565f89 fg:bold #24283b'
style_root = 'bg:#565f89 fg:bold #24283b'
format = '[ ´ïÇ  $user ]($style)'

[git_branch]
format = '[¯£Ñ $branch]($style)'
style = 'bg:#bb9af7 fg:bold #1a1b26'

[git_status]
format = '[ $ahead_behind $modified]($style)'
style = "bg:#bb9af7 fg:bold italic #1a1b26"
ahead = " ${count}´üí "
behind = " ${count}´üá "
diverged = " ${behind_count}´üá ${ahead_count}´üí  "
modified = "¯╗┐ "
untracked = " untracked ¯®¼ "
staged = " staged ¯®¼ "
renamed = " renamed ¯®¼ "
deleted = " deleted ¯®¼  "
up_to_date = "¯©®"
